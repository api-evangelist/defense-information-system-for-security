description: >-
  The Defense Information System for Security (DISS) is the enterprise-wide
  Department of Defense system of record for personnel security, suitability,
  and credentialing management for military, civilian, and contractor
  personnel. Operated by the Defense Counterintelligence and Security Agency
  (DCSA), DISS replaced the Joint Personnel Adjudication System (JPAS) as the
  system of record on March 31, 2021. DISS is restricted to authorized DoD
  and federal users and contractor security officers; it does not expose a
  public developer API.
